# BEACON Framework configuration — safe to customize
[framework]
name = "BEACON"
version = "1.0.0"          # installer / framework version
ruleset_version = "5.0.0"  # version of docs/governance/RULESET.md
pinned_at = "2026-06-06"

# Which stack-specific rule packs were installed (docs/governance/rules/).
installed_rule_packs = ["rust"]

# Advisory metadata only — the installer does not yet enforce this policy.
# It documents intent: which file classes are safe to refresh on re-install.
[update_policy]
auto_apply = ["Rules", "ToolInstructions"]
review_required = ["GovernanceDocs", "Conventions"]
locked = []
